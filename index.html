<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner AWB Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans sm:p-4 min-h-screen flex justify-center items-start">
    <div class="w-full max-w-md bg-slate-50 sm:rounded-[2rem] shadow-2xl overflow-hidden relative min-h-screen sm:min-h-[850px] flex flex-col">
        
        <div class="bg-gradient-to-r from-indigo-600 to-blue-500 p-6 rounded-b-[2rem] shadow-lg relative z-10">
            <div class="flex justify-between items-center text-white">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight">Scanner AWB</h1>
                    <p class="text-indigo-100 text-sm mt-1 font-medium">Sistem Pelacakan Cloud</p>
                </div>
                <div class="flex gap-2">
                    <button id="uploadIconBtn" class="p-2 bg-white/20 rounded-full hover:bg-white/30 transition active:scale-95" title="Unggah Data CSV">
                        <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                    </button>
                    <button id="deleteIconBtn" class="p-2 bg-white/20 rounded-full hover:bg-white/30 transition active:scale-95 text-red-100 hover:text-white" title="Hapus Semua Data">
                        <i data-lucide="trash-2" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="p-5 flex-1 overflow-y-auto hide-scrollbar flex flex-col gap-4 relative pt-4 pb-10">
            
            <input type="file" id="csvFileInput" accept=".csv" class="hidden">
            <div id="uploadAlert" class="hidden p-3 rounded-xl text-sm font-medium flex items-start gap-2">
                <i data-lucide="info" class="w-5 h-5 shrink-0 mt-0.5"></i>
                <span id="uploadStatus"></span>
            </div>

            <!-- Bagian Pencarian Utama -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Pencarian AWB / Scan</label>
                <div class="flex gap-2 relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    <input type="text" id="manualAwbInput" class="w-full bg-slate-50 border border-slate-200 pl-10 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Nomor AWB / Booking">
                    <button id="toggleScanBtn" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-4 rounded-xl transition active:scale-95 shadow-sm flex items-center justify-center shrink-0">
                        <i data-lucide="camera" class="w-5 h-5"></i>
                    </button>
                    <button id="searchBtn" class="bg-slate-800 hover:bg-slate-900 text-white px-5 rounded-xl font-bold transition active:scale-95 shadow-sm shrink-0">Cari</button>
                </div>
                <div id="searchStatus" class="hidden mt-3 flex items-center gap-2 text-indigo-600 text-sm font-medium">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Mencari data...
                </div>
            </div>

            <!-- Wadah Kamera Scanner -->
            <div id="scannerContainer" class="hidden bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <div id="reader" class="rounded-xl overflow-hidden border-2 border-indigo-200 bg-black w-full max-h-[150px] flex justify-center items-center"></div>
                <p class="text-xs text-center text-slate-400 mt-3 font-medium">Arahkan kamera ke barcode resi</p>
            </div>

            <!-- Kartu Hasil -->
            <div id="resultCard" class="hidden bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden mb-6">
                <div class="bg-indigo-50 border-b border-indigo-100 p-4 flex items-center gap-3">
                    <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600">
                        <i data-lucide="box" class="w-5 h-5"></i>
                    </div>
                    <h2 class="font-bold text-lg text-indigo-900">Detail Pengiriman</h2>
                </div>
                <div id="resultContent" class="p-4 space-y-4">
                </div>
            </div>

        </div>
    </div>

    <!-- Custom Password Modal -->
    <div id="passwordModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl relative transform transition-all scale-95 opacity-0" id="passwordModalContent">
            <h3 class="font-bold text-lg text-slate-900 mb-1" id="modalTitle">Masukkan Password</h3>
            <p class="text-sm text-slate-500 mb-4" id="modalDesc">Diperlukan akses admin.</p>
            <input type="password" id="modalPasswordInput" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition mb-4 text-center text-lg tracking-widest" placeholder="••••">
            <div class="flex gap-2">
                <button id="cancelModalBtn" class="flex-1 py-2.5 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition active:scale-95">Batal</button>
                <button id="submitModalBtn" class="flex-1 py-2.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition active:scale-95">Lanjut</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const supabaseUrl = 'https://qtsjehqdakvmmmnyuzda.supabase.co/rest/v1/awb_data';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0c2plaHFkYWt2bW1tbnl1emRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc4NzksImV4cCI6MjA5MDYyMzg3OX0.zeWEZw4Pw3dWqZpwRZFXnUHvDd_sMamSI9jRQquQPB8';
        
        const headers = {
            'apikey': supabaseKey,
            'Authorization': 'Bearer ' + supabaseKey,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=merge-duplicates'
        };

        let html5QrCode = null;
        let lastScannedAwb = '';
        let isScannerOpen = false;
        let currentAdminAction = null;

        const uploadIconBtn = document.getElementById('uploadIconBtn');
        const deleteIconBtn = document.getElementById('deleteIconBtn');
        const csvFileInput = document.getElementById('csvFileInput');
        const uploadAlert = document.getElementById('uploadAlert');
        const uploadStatus = document.getElementById('uploadStatus');
        
        const passwordModal = document.getElementById('passwordModal');
        const passwordModalContent = document.getElementById('passwordModalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalPasswordInput = document.getElementById('modalPasswordInput');
        const cancelModalBtn = document.getElementById('cancelModalBtn');
        const submitModalBtn = document.getElementById('submitModalBtn');

        const toggleScanBtn = document.getElementById('toggleScanBtn');
        const scannerContainer = document.getElementById('scannerContainer');
        const readerDiv = document.getElementById('reader');
        const resultCard = document.getElementById('resultCard');
        const resultContent = document.getElementById('resultContent');
        const manualAwbInput = document.getElementById('manualAwbInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchStatus = document.getElementById('searchStatus');

        function showUploadAlert(message, type) {
            uploadAlert.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-blue-50', 'text-blue-700', 'bg-green-50', 'text-green-700');
            uploadStatus.textContent = message;
            
            if (type === 'error') {
                uploadAlert.classList.add('bg-red-50', 'text-red-700');
            } else if (type === 'process') {
                uploadAlert.classList.add('bg-blue-50', 'text-blue-700');
            } else if (type === 'success') {
                uploadAlert.classList.add('bg-green-50', 'text-green-700');
            }
        }

        function openPasswordModal(action) {
            currentAdminAction = action;
            modalPasswordInput.value = '';
            
            if (action === 'upload') {
                modalTitle.textContent = 'Unggah Data CSV';
                modalDesc.textContent = 'Masukkan password untuk memperbarui database.';
            } else {
                modalTitle.textContent = 'Hapus Database';
                modalDesc.textContent = 'Masukkan password untuk MENGHAPUS SEMUA data.';
            }

            passwordModal.classList.remove('hidden');
            setTimeout(() => {
                passwordModalContent.classList.remove('scale-95', 'opacity-0');
                passwordModalContent.classList.add('scale-100', 'opacity-100');
                modalPasswordInput.focus();
            }, 10);
        }

        function closePasswordModal() {
            passwordModalContent.classList.remove('scale-100', 'opacity-100');
            passwordModalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                passwordModal.classList.add('hidden');
            }, 200);
        }

        uploadIconBtn.addEventListener('click', () => openPasswordModal('upload'));
        deleteIconBtn.addEventListener('click', () => openPasswordModal('delete'));
        cancelModalBtn.addEventListener('click', closePasswordModal);

        submitModalBtn.addEventListener('click', async () => {
            const pwd = modalPasswordInput.value;
            if (pwd !== '123') {
                showUploadAlert("Password admin salah.", "error");
                closePasswordModal();
                return;
            }

            closePasswordModal();

            if (currentAdminAction === 'upload') {
                csvFileInput.click();
            } else if (currentAdminAction === 'delete') {
                showUploadAlert("Menghapus seluruh data...", "process");
                try {
                    const response = await fetch(`${supabaseUrl}?awb_no=not.is.null`, {
                        method: 'DELETE',
                        headers: headers
                    });
                    if (!response.ok) throw new Error("Gagal hapus");
                    showUploadAlert("Semua data berhasil dihapus.", "success");
                } catch (error) {
                    showUploadAlert("Gagal menghapus data dari server.", "error");
                }
            }
        });

        csvFileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            showUploadAlert("Membaca file CSV...", "process");
            
            Papa.parse(file, {
                header: true,
                delimiter: "|", 
                skipEmptyLines: true,
                complete: async function(results) {
                    showUploadAlert("Mengunggah data ke database. Mohon tunggu...", "process");
                    
                    const payload = results.data
                        .filter(row => row.awb_no)
                        .map(row => ({
                            awb_no: row.awb_no.trim(),
                            kode_booking: row.kode_booking ? row.kode_booking.trim() : '',
                            fop_code_internal: row.fop_code_internal || '',
                            destination_uz: row.destination_uz || '',
                            expect_delivery_tm: row.expect_delivery_tm || '',
                            nama_operator_internal: row.nama_operator_internal || ''
                        }));

                    try {
                        await uploadDataKeSupabase(payload);
                        showUploadAlert(`Berhasil menyimpan ${payload.length} data.`, "success");
                    } catch (error) {
                        showUploadAlert(`Gagal: ${error.message}`, "error");
                    }
                    csvFileInput.value = ''; // Reset
                },
                error: function() {
                    showUploadAlert("Gagal membaca file CSV.", "error");
                    csvFileInput.value = '';
                }
            });
        });

        async function uploadDataKeSupabase(dataArray) {
            const chunkSize = 500;
            for (let i = 0; i < dataArray.length; i += chunkSize) {
                const chunk = dataArray.slice(i, i + chunkSize);
                const response = await fetch(supabaseUrl, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(chunk)
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || "Gagal unggah ke server.");
                }
            }
        }

        toggleScanBtn.addEventListener('click', function() {
            if (isScannerOpen) {
                hentikanScanner();
            } else {
                mulaiScanner();
            }
        });

        searchBtn.addEventListener('click', function() {
            const awb = manualAwbInput.value.trim();
            if (awb) {
                cariDataDiDatabase(awb);
                manualAwbInput.select();
            }
        });

        manualAwbInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const awb = manualAwbInput.value.trim();
                if (awb) {
                    cariDataDiDatabase(awb);
                    manualAwbInput.select();
                }
            }
        });

        // Deteksi Scanner Fisik (USB/Bluetooth)
        let barcodeBuffer = '';
        let lastKeyTime = Date.now();

        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                return;
            }

            const currentTime = Date.now();
            if (currentTime - lastKeyTime > 500) {
                barcodeBuffer = '';
            }
            lastKeyTime = currentTime;

            if (e.key === 'Enter') {
                if (barcodeBuffer.length > 2) {
                    const awb = barcodeBuffer.trim();
                    manualAwbInput.value = awb;
                    playBeepSound();
                    cariDataDiDatabase(awb);
                }
                barcodeBuffer = '';
            } else if (e.key.length === 1) {
                barcodeBuffer += e.key;
            }
        });

        function playBeepSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (error) {
                console.log(error);
            }
        }

        function mulaiScanner() {
            isScannerOpen = true;
            scannerContainer.classList.remove('hidden');
            toggleScanBtn.innerHTML = `<i data-lucide="x" class="w-5 h-5"></i>`;
            toggleScanBtn.classList.replace('bg-indigo-100', 'bg-red-100');
            toggleScanBtn.classList.replace('text-indigo-700', 'text-red-700');
            lucide.createIcons();
            lastScannedAwb = '';

            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 80 }, aspectRatio: 2.5 },
            function(decodedText) {
                const awb = decodedText.trim();
                if (awb !== lastScannedAwb) {
                    playBeepSound();
                    lastScannedAwb = awb;
                    manualAwbInput.value = awb;
                    cariDataDiDatabase(awb);
                    
                    setTimeout(() => {
                        lastScannedAwb = '';
                    }, 3000);
                }
            },
            function(errorMessage) {
                }
            ).catch(function() {
                readerDiv.innerHTML = `<div class="p-6 text-red-500 text-center font-bold bg-white"><i data-lucide="camera-off" class="w-8 h-8 mx-auto mb-2"></i>Gagal mengakses kamera.</div>`;
                lucide.createIcons();
                hentikanScanner();
            });
        }

        function hentikanScanner() {
            isScannerOpen = false;
            if (html5QrCode) {
                try {
                    html5QrCode.stop().then(() => {
                        bersihkanUI();
                    }).catch(() => {
                        bersihkanUI();
                    });
                } catch (err) {
                    bersihkanUI();
                }
            } else {
                bersihkanUI();
            }
        }

        function bersihkanUI() {
            if (html5QrCode) {
                try { html5QrCode.clear(); } catch(e) {}
                html5QrCode = null;
            }
            scannerContainer.classList.add('hidden');
            toggleScanBtn.innerHTML = `<i data-lucide="camera" class="w-5 h-5"></i>`;
            toggleScanBtn.classList.replace('bg-red-100', 'bg-indigo-100');
            toggleScanBtn.classList.replace('text-red-700', 'text-indigo-700');
            lucide.createIcons();
        }

        async function cariDataDiDatabase(awb) {
            searchStatus.classList.remove('hidden');
            resultCard.classList.add('hidden');
            searchBtn.disabled = true;

            try {
                const encodedAwb = encodeURIComponent(awb);
                const response = await fetch(`${supabaseUrl}?or=(awb_no.eq.${encodedAwb},kode_booking.eq.${encodedAwb})&select=*`, {
                    method: 'GET',
                    headers: headers
                });
                
                if (!response.ok) throw new Error("Gagal mengambil data");
                
                const data = await response.json();
                
                if (data && data.length > 0) {
                    tampilkanHasil(data[0]);
                } else {
                    tampilkanHasil(null, awb);
                }
            } catch (error) {
                resultCard.classList.remove('hidden');
                resultContent.innerHTML = `
                    <div class="text-center py-6">
                        <i data-lucide="wifi-off" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i>
                        <p class="text-red-600 font-medium">Terjadi kesalahan jaringan.</p>
                    </div>`;
                lucide.createIcons();
            } finally {
                searchStatus.classList.add('hidden');
                searchBtn.disabled = false;
            }
        }

        function tampilkanHasil(data, awb) {
            resultCard.classList.remove('hidden');
            
            if (data) {
                let slaNumber = '-';
                let slaColor = 'text-indigo-700';
                
                let awbBgClass = 'bg-indigo-50/50 border-indigo-50';
                let awbTextClass = 'text-slate-900';
                let awbLabelClass = 'text-slate-500';
                let awbSubTextClass = 'text-slate-600';
                
                if (data.expect_delivery_tm) {
                    const expectDate = new Date(data.expect_delivery_tm);
                    const today = new Date();
                    expectDate.setHours(0, 0, 0, 0);
                    today.setHours(0, 0, 0, 0);
                    
                    const diffTime = expectDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    slaNumber = diffDays;
                    
                    if (diffDays < 0) {
                        slaColor = 'text-red-600';
                        awbBgClass = 'bg-red-100 border-red-200';
                        awbTextClass = 'text-red-900';
                        awbLabelClass = 'text-red-600';
                        awbSubTextClass = 'text-red-700';
                    } else if (diffDays >= 0 && diffDays <= 1) {
                        slaColor = 'text-yellow-600';
                        awbBgClass = 'bg-yellow-100 border-yellow-200';
                        awbTextClass = 'text-yellow-900';
                        awbLabelClass = 'text-yellow-600';
                        awbSubTextClass = 'text-yellow-700';
                    } else {
                        slaColor = 'text-green-600';
                        awbBgClass = 'bg-green-100 border-green-200';
                        awbTextClass = 'text-green-900';
                        awbLabelClass = 'text-green-600';
                        awbSubTextClass = 'text-green-700';
                    }
                }

                resultContent.innerHTML = `
                    <div class="${awbBgClass} p-4 rounded-xl border flex justify-between items-center gap-2 mb-4">
                        <div class="overflow-hidden">
                            <p class="text-xs font-semibold ${awbLabelClass} uppercase tracking-wider mb-1">Nomor AWB</p>
                            <p class="font-bold text-xl sm:text-2xl ${awbTextClass} tracking-tight truncate">${data.awb_no}</p>
                            <p class="text-xs font-medium ${awbSubTextClass} mt-1 truncate">${data.kode_booking || 'Tanpa Booking'}</p>
                        </div>
                        <div class="text-right shrink-0">
                            <p class="text-xs font-semibold ${awbLabelClass} uppercase tracking-wider mb-1">SLA Paket</p>
                            <div class="bg-white/90 px-4 py-2 rounded-lg border shadow-sm flex flex-col items-center justify-center">
                                <p class="font-black text-xl sm:text-2xl leading-none ${slaColor}">${slaNumber}</p>
                                <p class="text-[10px] font-bold text-slate-500 uppercase mt-1">Hari</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm col-span-2">
                            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Destinasi UZ</p>
                            <p class="font-bold text-slate-800">${data.destination_uz || '-'}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Target Kirim</p>
                            <p class="font-bold text-slate-800">${data.expect_delivery_tm || '-'}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">FOP Internal</p>
                            <p class="font-bold text-slate-800">${data.fop_code_internal || '-'}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm col-span-2">
                            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Operator Internal</p>
                            <p class="font-bold text-slate-800">${data.nama_operator_internal || '-'}</p>
                        </div>
                    </div>
                `;
            } else {
                resultContent.innerHTML = `
                    <div class="text-center py-6">
                        <i data-lucide="file-question" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i>
                        <p class="text-slate-600 font-medium">Data <span class="text-slate-900 font-bold">${awb}</span> tidak ditemukan.</p>
                    </div>`;
            }
            lucide.createIcons();
            
            const resultElement = document.getElementById('resultCard');
            if (resultElement) {
                resultElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
    </script>
</body>
</html>
