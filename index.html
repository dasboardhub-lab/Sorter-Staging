<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner AWB Mobile</title>
    <!-- Menggunakan Tailwind CSS statis untuk kompabilitas perangkat lama -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .rounded-b-3xl {
            border-bottom-left-radius: 1.5rem;
            border-bottom-right-radius: 1.5rem;
        }
        .sm-rounded-3xl {
            border-radius: 1.5rem;
        }
        .text-xxs {
            font-size: 0.65rem;
        }
        .backdrop-blur-sm {
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans sm:p-4 min-h-screen flex justify-center items-start">
    <div class="w-full max-w-md bg-gray-50 sm-rounded-3xl shadow-2xl overflow-hidden relative flex flex-col" style="min-height: 850px;">
        
        <div class="bg-gradient-to-r from-indigo-600 to-blue-500 p-6 rounded-b-3xl shadow-lg relative z-10">
            <div class="flex justify-between items-center text-white">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight">Scanner AWB</h1>
                    <p class="text-indigo-100 text-sm mt-1 font-medium">Sistem Pelacakan Cloud</p>
                </div>
                <div class="flex gap-2">
                    <button id="viewDataBtn" class="p-2 bg-white bg-opacity-20 rounded-full hover:bg-opacity-30 transition transform active:scale-95" title="Lihat Tabel Data">
                        <i data-lucide="table" class="w-6 h-6"></i>
                    </button>
                    <button id="uploadIconBtn" class="p-2 bg-white bg-opacity-20 rounded-full hover:bg-opacity-30 transition transform active:scale-95" title="Unggah Data CSV">
                        <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                    </button>
                    <button id="deleteIconBtn" class="p-2 bg-white bg-opacity-20 rounded-full hover:bg-opacity-30 transition transform active:scale-95 text-red-100 hover:text-white" title="Hapus Semua Data">
                        <i data-lucide="trash-2" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="p-5 flex-1 overflow-y-auto hide-scrollbar flex flex-col gap-4 relative pt-4 pb-10">
            
            <input type="file" id="csvFileInput" accept=".csv" class="hidden">
            <div id="uploadAlert" class="hidden p-3 rounded-xl text-sm font-medium flex items-start gap-2">
                <i data-lucide="info" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                <span id="uploadStatus"></span>
            </div>

            <!-- Bagian Pencarian Utama -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Pencarian AWB / Scan</label>
                <div class="flex gap-2 relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="w-5 h-5 text-gray-400"></i>
                    </div>
                    <input type="text" id="manualAwbInput" class="w-full bg-gray-50 border border-gray-200 pl-10 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Nomor AWB / Booking">
                    <button id="toggleScanBtn" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-4 rounded-xl transition transform active:scale-95 shadow-sm flex items-center justify-center flex-shrink-0">
                        <i data-lucide="camera" class="w-5 h-5"></i>
                    </button>
                    <button id="searchBtn" class="bg-gray-800 hover:bg-gray-900 text-white px-5 rounded-xl font-bold transition transform active:scale-95 shadow-sm flex-shrink-0">Cari</button>
                </div>
                <div id="searchStatus" class="hidden mt-3 flex items-center gap-2 text-indigo-600 text-sm font-medium">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Mencari data...
                </div>
            </div>

            <!-- Wadah Kamera Scanner -->
            <div id="scannerContainer" class="hidden bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <div id="reader" class="rounded-xl overflow-hidden border-2 border-indigo-200 bg-black w-full flex justify-center items-center" style="min-height: 250px;"></div>
                <p class="text-xs text-center text-gray-400 mt-3 font-medium">Arahkan kamera ke barcode resi</p>
            </div>

            <!-- Kartu Hasil -->
            <div id="resultCard" class="hidden bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden mb-6">
                <div class="bg-indigo-50 border-b border-indigo-100 p-4 flex items-center gap-3">
                    <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600">
                        <i data-lucide="box" class="w-5 h-5"></i>
                    </div>
                    <h2 class="font-bold text-lg text-indigo-900">Detail Pengiriman</h2>
                </div>
                <div id="resultContent" class="p-4 space-y-4">
                </div>
            </div>

        </div>
    </div>

    <!-- Modal Tabel Data -->
    <div id="dataTableModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-95 z-50 flex flex-col p-2 sm:p-6 backdrop-blur-sm">
        <div class="flex justify-between items-center mb-3 text-white px-2 mt-2">
            <div>
                <h3 class="font-bold text-xl">Database AWB</h3>
                <p class="text-xs text-gray-400" id="totalDataCount">Memuat...</p>
            </div>
            <div class="flex gap-2">
                <button id="refreshDataBtn" class="p-2 bg-white bg-opacity-10 rounded-full hover:bg-opacity-20 transition">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
                <button id="closeDataTableBtn" class="p-2 bg-red-500 bg-opacity-80 rounded-full hover:bg-opacity-100 transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
        <div class="flex-1 bg-white rounded-2xl overflow-hidden flex flex-col shadow-2xl">
            <div class="flex-1 overflow-auto">
                <table class="w-full text-left border-collapse text-sm whitespace-nowrap">
                    <thead class="bg-indigo-50 sticky top-0 shadow-sm z-10">
                        <tr>
                            <th class="p-3 border-b border-indigo-100 font-bold text-indigo-900">No AWB</th>
                            <th class="p-3 border-b border-indigo-100 font-bold text-indigo-900">Kode Booking</th>
                            <th class="p-3 border-b border-indigo-100 font-bold text-indigo-900">SLA Target</th>
                            <th class="p-3 border-b border-indigo-100 font-bold text-indigo-900">FOP Internal</th>
                            <th class="p-3 border-b border-indigo-100 font-bold text-indigo-900">Destinasi UZ</th>
                            <th class="p-3 border-b border-indigo-100 font-bold text-indigo-900">Operator</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody">
                        <!-- Baris data dimuat disini -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Custom Password Modal -->
    <div id="passwordModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-60 backdrop-blur-sm z-50 flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl relative transform transition-all scale-95 opacity-0" id="passwordModalContent">
            <h3 class="font-bold text-lg text-gray-900 mb-1" id="modalTitle">Masukkan Password</h3>
            <p class="text-sm text-gray-500 mb-4" id="modalDesc">Diperlukan akses admin.</p>
            <input type="password" id="modalPasswordInput" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition mb-4 text-center text-lg tracking-widest" placeholder="••••">
            <div class="flex gap-2">
                <button id="cancelModalBtn" class="flex-1 py-2.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition transform active:scale-95">Batal</button>
                <button id="submitModalBtn" class="flex-1 py-2.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition transform active:scale-95">Lanjut</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        var supabaseUrl = 'https://qtsjehqdakvmmmnyuzda.supabase.co/rest/v1/awb_data';
        var supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0c2plaHFkYWt2bW1tbnl1emRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc4NzksImV4cCI6MjA5MDYyMzg3OX0.zeWEZw4Pw3dWqZpwRZFXnUHvDd_sMamSI9jRQquQPB8';
        
        var headers = {
            'apikey': supabaseKey,
            'Authorization': 'Bearer ' + supabaseKey,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=merge-duplicates'
        };

        var html5QrCode = null;
        var lastScannedAwb = '';
        var isScannerOpen = false;
        var currentAdminAction = null;

        var viewDataBtn = document.getElementById('viewDataBtn');
        var dataTableModal = document.getElementById('dataTableModal');
        var closeDataTableBtn = document.getElementById('closeDataTableBtn');
        var refreshDataBtn = document.getElementById('refreshDataBtn');
        var dataTableBody = document.getElementById('dataTableBody');
        var totalDataCount = document.getElementById('totalDataCount');

        var uploadIconBtn = document.getElementById('uploadIconBtn');
        var deleteIconBtn = document.getElementById('deleteIconBtn');
        var csvFileInput = document.getElementById('csvFileInput');
        var uploadAlert = document.getElementById('uploadAlert');
        var uploadStatus = document.getElementById('uploadStatus');
        
        var passwordModal = document.getElementById('passwordModal');
        var passwordModalContent = document.getElementById('passwordModalContent');
        var modalTitle = document.getElementById('modalTitle');
        var modalDesc = document.getElementById('modalDesc');
        var modalPasswordInput = document.getElementById('modalPasswordInput');
        var cancelModalBtn = document.getElementById('cancelModalBtn');
        var submitModalBtn = document.getElementById('submitModalBtn');

        var toggleScanBtn = document.getElementById('toggleScanBtn');
        var scannerContainer = document.getElementById('scannerContainer');
        var readerDiv = document.getElementById('reader');
        var resultCard = document.getElementById('resultCard');
        var resultContent = document.getElementById('resultContent');
        var manualAwbInput = document.getElementById('manualAwbInput');
        var searchBtn = document.getElementById('searchBtn');
        var searchStatus = document.getElementById('searchStatus');

        function showUploadAlert(message, type) {
            uploadAlert.className = 'p-3 rounded-xl text-sm font-medium flex items-start gap-2';
            uploadStatus.textContent = message;
            
            if (type === 'error') {
                uploadAlert.classList.add('bg-red-50', 'text-red-700');
            } else if (type === 'process') {
                uploadAlert.classList.add('bg-blue-50', 'text-blue-700');
            } else if (type === 'success') {
                uploadAlert.classList.add('bg-green-50', 'text-green-700');
            }
        }

        // Fitur Modal Tabel Data
        viewDataBtn.addEventListener('click', function() {
            dataTableModal.classList.remove('hidden');
            loadTableData();
        });

        closeDataTableBtn.addEventListener('click', function() {
            dataTableModal.classList.add('hidden');
        });

        refreshDataBtn.addEventListener('click', loadTableData);

        function loadTableData() {
            dataTableBody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-gray-500"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i>Memuat data dari server...</td></tr>';
            lucide.createIcons();
            totalDataCount.textContent = 'Memuat...';

            fetch(supabaseUrl + '?select=*&limit=500', {
                method: 'GET',
                headers: headers
            })
            .then(function(response) {
                if (!response.ok) throw new Error("Gagal memuat data");
                return response.json();
            })
            .then(function(data) {
                totalDataCount.textContent = 'Menampilkan ' + data.length + ' baris data terbaru';
                
                if (data.length === 0) {
                    dataTableBody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-gray-500">Database masih kosong.</td></tr>';
                    return;
                }

                var rows = '';
                data.forEach(function(row) {
                    rows += '<tr class="border-b border-gray-100 hover:bg-gray-50">' +
                        '<td class="p-3 font-semibold text-gray-900">' + row.awb_no + '</td>' +
                        '<td class="p-3 text-gray-600">' + (row.kode_booking || '-') + '</td>' +
                        '<td class="p-3 text-gray-600">' + (row.expect_delivery_tm || '-') + '</td>' +
                        '<td class="p-3 text-gray-600">' + (row.fop_code_internal || '-') + '</td>' +
                        '<td class="p-3 text-gray-600">' + (row.destination_uz || '-') + '</td>' +
                        '<td class="p-3 text-gray-600">' + (row.nama_operator_internal || '-') + '</td>' +
                    '</tr>';
                });
                dataTableBody.innerHTML = rows;
            })
            .catch(function(error) {
                dataTableBody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-red-500">Gagal terhubung ke database. Periksa koneksi internet Anda.</td></tr>';
            });
        }

        // Fitur Modal Password
        function openPasswordModal(action) {
            currentAdminAction = action;
            modalPasswordInput.value = '';
            
            if (action === 'upload') {
                modalTitle.textContent = 'Unggah Data CSV';
                modalDesc.textContent = 'Masukkan password untuk memperbarui database.';
            } else {
                modalTitle.textContent = 'Hapus Database';
                modalDesc.textContent = 'Masukkan password untuk MENGHAPUS SEMUA data.';
            }

            passwordModal.classList.remove('hidden');
            setTimeout(function() {
                passwordModalContent.classList.remove('scale-95', 'opacity-0');
                passwordModalContent.classList.add('scale-100', 'opacity-100');
                modalPasswordInput.focus();
            }, 10);
        }

        function closePasswordModal() {
            passwordModalContent.classList.remove('scale-100', 'opacity-100');
            passwordModalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(function() {
                passwordModal.classList.add('hidden');
            }, 200);
        }

        uploadIconBtn.addEventListener('click', function() { openPasswordModal('upload'); });
        deleteIconBtn.addEventListener('click', function() { openPasswordModal('delete'); });
        cancelModalBtn.addEventListener('click', closePasswordModal);

        submitModalBtn.addEventListener('click', function() {
            var pwd = modalPasswordInput.value;
            if (pwd !== '123') {
                showUploadAlert("Password admin salah.", "error");
                closePasswordModal();
                return;
            }

            closePasswordModal();

            if (currentAdminAction === 'upload') {
                csvFileInput.click();
            } else if (currentAdminAction === 'delete') {
                showUploadAlert("Menghapus seluruh data...", "process");
                
                fetch(supabaseUrl + '?awb_no=not.is.null', {
                    method: 'DELETE',
                    headers: headers
                })
                .then(function(response) {
                    if (!response.ok) throw new Error("Gagal hapus");
                    showUploadAlert("Semua data berhasil dihapus.", "success");
                })
                .catch(function(error) {
                    showUploadAlert("Gagal menghapus data dari server.", "error");
                });
            }
        });

        csvFileInput.addEventListener('change', function(event) {
            var file = event.target.files[0];
            if (!file) return;

            showUploadAlert("Membaca file CSV...", "process");
            
            Papa.parse(file, {
                header: true,
                delimiter: "|", 
                skipEmptyLines: true,
                complete: function(results) {
                    showUploadAlert("Mengunggah data ke database. Mohon tunggu...", "process");
                    
                    var payload = results.data
                        .filter(function(row) { return row.awb_no; })
                        .map(function(row) {
                            return {
                                awb_no: row.awb_no.trim(),
                                kode_booking: row.kode_booking ? row.kode_booking.trim() : '',
                                fop_code_internal: row.fop_code_internal || '',
                                destination_uz: row.destination_uz || '',
                                expect_delivery_tm: row.expect_delivery_tm || '',
                                nama_operator_internal: row.nama_operator_internal || ''
                            };
                        });

                    uploadDataKeSupabase(payload)
                        .then(function() {
                            showUploadAlert("Berhasil menyimpan " + payload.length + " data.", "success");
                            csvFileInput.value = '';
                        })
                        .catch(function(error) {
                            showUploadAlert("Gagal: " + error.message, "error");
                            csvFileInput.value = '';
                        });
                },
                error: function() {
                    showUploadAlert("Gagal membaca file CSV.", "error");
                    csvFileInput.value = '';
                }
            });
        });

        function uploadDataKeSupabase(dataArray) {
            var chunkSize = 500;
            var promises = [];
            
            for (var i = 0; i < dataArray.length; i += chunkSize) {
                var chunk = dataArray.slice(i, i + chunkSize);
                var p = fetch(supabaseUrl, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(chunk)
                }).then(function(res) {
                    if (!res.ok) {
                        return res.json().then(function(err) { throw new Error(err.message || "Gagal unggah"); });
                    }
                    return res;
                });
                promises.push(p);
            }
            
            return Promise.all(promises);
        }

        toggleScanBtn.addEventListener('click', function() {
            if (isScannerOpen) {
                hentikanScanner();
            } else {
                mulaiScanner();
            }
        });

        searchBtn.addEventListener('click', function() {
            var awb = manualAwbInput.value.trim();
            if (awb) {
                cariDataDiDatabase(awb);
                manualAwbInput.select();
            }
        });

        manualAwbInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                var awb = manualAwbInput.value.trim();
                if (awb) {
                    cariDataDiDatabase(awb);
                    manualAwbInput.select();
                }
            }
        });

        // Deteksi Scanner Fisik (USB/Bluetooth)
        var barcodeBuffer = '';
        var lastKeyTime = Date.now();

        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                return;
            }

            var currentTime = Date.now();
            if (currentTime - lastKeyTime > 500) {
                barcodeBuffer = '';
            }
            lastKeyTime = currentTime;

            if (e.key === 'Enter') {
                if (barcodeBuffer.length > 2) {
                    var awb = barcodeBuffer.trim();
                    manualAwbInput.value = awb;
                    playBeepSound();
                    cariDataDiDatabase(awb);
                }
                barcodeBuffer = '';
            } else if (e.key.length === 1) {
                barcodeBuffer += e.key;
            }
        });

        function playBeepSound() {
            try {
                var AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                var audioCtx = new AudioContext();
                var oscillator = audioCtx.createOscillator();
                var gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (error) {
                console.log("Audio not supported");
            }
        }

        function mulaiScanner() {
            isScannerOpen = true;
            scannerContainer.classList.remove('hidden');
            toggleScanBtn.innerHTML = '<i data-lucide="x" class="w-5 h-5"></i>';
            toggleScanBtn.classList.remove('bg-indigo-100', 'text-indigo-700', 'hover:bg-indigo-200');
            toggleScanBtn.classList.add('bg-red-100', 'text-red-700', 'hover:bg-red-200');
            lucide.createIcons();
            lastScannedAwb = '';

            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
            { facingMode: "environment" },
            { 
                fps: 10, 
                qrbox: function(viewfinderWidth, viewfinderHeight) {
                    return {
                        width: Math.floor(viewfinderWidth * 0.9),
                        height: 180
                    };
                }, 
                aspectRatio: 1.3333 
            },
            function(decodedText) {
                var awb = decodedText.trim();
                if (awb !== lastScannedAwb) {
                    playBeepSound();
                    lastScannedAwb = awb;
                    manualAwbInput.value = awb;
                    cariDataDiDatabase(awb);
                    
                    setTimeout(function() {
                        lastScannedAwb = '';
                    }, 3000);
                }
            },
            function(errorMessage) {
            }
            ).catch(function() {
                readerDiv.innerHTML = '<div class="p-6 text-red-500 text-center font-bold bg-white"><i data-lucide="camera-off" class="w-8 h-8 mx-auto mb-2"></i>Gagal mengakses kamera.</div>';
                lucide.createIcons();
                hentikanScanner();
            });
        }

        function hentikanScanner() {
            isScannerOpen = false;
            if (html5QrCode) {
                try {
                    html5QrCode.stop().then(function() {
                        bersihkanUI();
                    }).catch(function() {
                        bersihkanUI();
                    });
                } catch (err) {
                    bersihkanUI();
                }
            } else {
                bersihkanUI();
            }
        }

        function bersihkanUI() {
            if (html5QrCode) {
                try { html5QrCode.clear(); } catch(e) {}
                html5QrCode = null;
            }
            scannerContainer.classList.add('hidden');
            toggleScanBtn.innerHTML = '<i data-lucide="camera" class="w-5 h-5"></i>';
            toggleScanBtn.classList.remove('bg-red-100', 'text-red-700', 'hover:bg-red-200');
            toggleScanBtn.classList.add('bg-indigo-100', 'text-indigo-700', 'hover:bg-indigo-200');
            lucide.createIcons();
        }

        function cariDataDiDatabase(awb) {
            searchStatus.classList.remove('hidden');
            resultCard.classList.add('hidden');
            searchBtn.disabled = true;

            var encodedAwb = encodeURIComponent(awb);
            
            fetch(supabaseUrl + '?or=(awb_no.eq.' + encodedAwb + ',kode_booking.eq.' + encodedAwb + ')&select=*', {
                method: 'GET',
                headers: headers
            })
            .then(function(response) {
                if (!response.ok) throw new Error("Gagal mengambil data");
                return response.json();
            })
            .then(function(data) {
                if (data && data.length > 0) {
                    tampilkanHasil(data[0]);
                } else {
                    tampilkanHasil(null, awb);
                }
                searchStatus.classList.add('hidden');
                searchBtn.disabled = false;
            })
            .catch(function(error) {
                resultCard.classList.remove('hidden');
                resultContent.innerHTML = 
                    '<div class="text-center py-6">' +
                        '<i data-lucide="wifi-off" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>' +
                        '<p class="text-red-600 font-medium">Terjadi kesalahan jaringan.</p>' +
                    '</div>';
                lucide.createIcons();
                searchStatus.classList.add('hidden');
                searchBtn.disabled = false;
            });
        }

        function tampilkanHasil(data, awb) {
            resultCard.classList.remove('hidden');
            
            if (data) {
                var slaNumber = '-';
                var slaColor = 'text-indigo-700';
                
                var awbBgClass = 'bg-indigo-50 bg-opacity-50 border-indigo-50';
                var awbTextClass = 'text-gray-900';
                var awbLabelClass = 'text-gray-500';
                var awbSubTextClass = 'text-gray-600';
                
                if (data.expect_delivery_tm) {
                    var expectDate = new Date(data.expect_delivery_tm);
                    var today = new Date();
                    expectDate.setHours(0, 0, 0, 0);
                    today.setHours(0, 0, 0, 0);
                    
                    var diffTime = expectDate - today;
                    var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    slaNumber = diffDays;
                    
                    if (diffDays < 0) {
                        slaColor = 'text-red-600';
                        awbBgClass = 'bg-red-100 border-red-200';
                        awbTextClass = 'text-red-900';
                        awbLabelClass = 'text-red-600';
                        awbSubTextClass = 'text-red-700';
                    } else if (diffDays >= 0 && diffDays <= 1) {
                        slaColor = 'text-yellow-600';
                        awbBgClass = 'bg-yellow-100 border-yellow-200';
                        awbTextClass = 'text-yellow-900';
                        awbLabelClass = 'text-yellow-600';
                        awbSubTextClass = 'text-yellow-700';
                    } else {
                        slaColor = 'text-green-600';
                        awbBgClass = 'bg-green-100 border-green-200';
                        awbTextClass = 'text-green-900';
                        awbLabelClass = 'text-green-600';
                        awbSubTextClass = 'text-green-700';
                    }
                }

                var kodeBooking = data.kode_booking ? data.kode_booking : 'Tanpa Booking';
                var targetKirim = data.expect_delivery_tm ? data.expect_delivery_tm : '-';
                var fopInternal = data.fop_code_internal ? data.fop_code_internal : '-';
                var destUz = data.destination_uz ? data.destination_uz : '-';
                var operator = data.nama_operator_internal ? data.nama_operator_internal : '-';

                resultContent.innerHTML = 
                    '<div class="' + awbBgClass + ' p-4 rounded-xl border flex justify-between items-center gap-2 mb-4">' +
                        '<div class="overflow-hidden">' +
                            '<p class="text-xs font-semibold ' + awbLabelClass + ' uppercase tracking-wider mb-1">Nomor AWB</p>' +
                            '<p class="font-bold text-xl sm:text-2xl ' + awbTextClass + ' tracking-tight truncate">' + data.awb_no + '</p>' +
                            '<p class="text-xs font-medium ' + awbSubTextClass + ' mt-1 truncate">' + kodeBooking + '</p>' +
                        '</div>' +
                        '<div class="text-right flex-shrink-0">' +
                            '<p class="text-xs font-semibold ' + awbLabelClass + ' uppercase tracking-wider mb-1">SLA Paket</p>' +
                            '<div class="bg-white px-4 py-2 rounded-lg border shadow-sm flex flex-col items-center justify-center">' +
                                '<p class="font-black text-xl sm:text-2xl leading-none ' + slaColor + '">' + slaNumber + '</p>' +
                                '<p class="text-xxs font-bold text-gray-500 uppercase mt-1">Hari</p>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="grid grid-cols-2 gap-3">' +
                        '<div class="bg-gray-50 p-4 rounded-xl border border-gray-100 shadow-sm col-span-2">' +
                            '<p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Destinasi UZ</p>' +
                            '<p class="font-bold text-gray-800">' + destUz + '</p>' +
                        '</div>' +
                        '<div class="bg-gray-50 p-4 rounded-xl border border-gray-100 shadow-sm">' +
                            '<p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Target Kirim</p>' +
                            '<p class="font-bold text-gray-800">' + targetKirim + '</p>' +
                        '</div>' +
                        '<div class="bg-gray-50 p-4 rounded-xl border border-gray-100 shadow-sm">' +
                            '<p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">FOP Internal</p>' +
                            '<p class="font-bold text-gray-800">' + fopInternal + '</p>' +
                        '</div>' +
                        '<div class="bg-gray-50 p-4 rounded-xl border border-gray-100 shadow-sm col-span-2">' +
                            '<p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Operator Internal</p>' +
                            '<p class="font-bold text-gray-800">' + operator + '</p>' +
                        '</div>' +
                    '</div>';
            } else {
                resultContent.innerHTML = 
                    '<div class="text-center py-6">' +
                        '<i data-lucide="file-question" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>' +
                        '<p class="text-gray-600 font-medium">Data <span class="text-gray-900 font-bold">' + awb + '</span> tidak ditemukan.</p>' +
                    '</div>';
            }
            lucide.createIcons();
            
            var resultElement = document.getElementById('resultCard');
            if (resultElement) {
                resultElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
    </script>
</body>
</html>
