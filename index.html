<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner AWB Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans sm:p-4 min-h-screen flex justify-center items-start">
    <div class="w-full max-w-md bg-slate-50 sm:rounded-[2rem] shadow-2xl overflow-hidden relative min-h-screen sm:min-h-[850px] flex flex-col">
        
        <div class="bg-gradient-to-r from-indigo-600 to-blue-500 p-6 rounded-b-[2rem] shadow-lg relative z-10">
            <div class="flex justify-between items-center text-white">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight">Scanner AWB</h1>
                    <p class="text-indigo-100 text-sm mt-1 font-medium">Sistem Pelacakan Cloud</p>
                </div>
                <button id="toggleAdminBtn" class="p-2 bg-white/20 rounded-full hover:bg-white/30 transition active:scale-95">
                    <i data-lucide="settings" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <div class="p-5 flex-1 overflow-y-auto hide-scrollbar flex flex-col gap-5 relative -mt-4 pt-10">
            
            <div id="adminPanel" class="hidden bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4 transition-all">
                <div class="flex items-center gap-2 border-b border-slate-100 pb-3">
                    <i data-lucide="database" class="w-5 h-5 text-indigo-500"></i>
                    <h2 class="font-bold text-slate-700">Kelola Database</h2>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Password Admin</label>
                    <input type="password" id="adminPassword" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Masukkan Password">
                </div>

                <div class="pt-2">
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Unggah Data Baru (CSV)</label>
                    <div class="relative">
                        <input type="file" id="csvFileInput" accept=".csv" class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer bg-slate-50 border border-slate-200 rounded-xl">
                    </div>
                </div>

                <button id="deleteDbBtn" class="w-full flex justify-center items-center gap-2 bg-red-50 hover:bg-red-100 text-red-600 p-3 rounded-xl font-bold transition active:scale-95 border border-red-100">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Hapus Semua Data
                </button>

                <div id="uploadAlert" class="hidden p-3 rounded-xl text-sm font-medium flex items-start gap-2">
                    <i data-lucide="info" class="w-5 h-5 shrink-0 mt-0.5"></i>
                    <span id="uploadStatus"></span>
                </div>
            </div>

            <div id="resultCard" class="hidden bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden mb-6">
                <div class="bg-indigo-50 border-b border-indigo-100 p-4 flex items-center gap-3">
                    <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600">
                        <i data-lucide="box" class="w-5 h-5"></i>
                    </div>
                    <h2 class="font-bold text-lg text-indigo-900">Detail Pengiriman</h2>
                </div>
                <div id="resultContent" class="p-4 space-y-4">
                </div>
            </div>

            <div class="flex bg-slate-200 p-1 rounded-xl mb-2">
                <button id="tabScannerBtn" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-indigo-700 transition-all">Kamera</button>
                <button id="tabManualBtn" class="flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition-all">Manual</button>
            </div>

            <div id="tabKamera" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
                <button id="startScanBtn" class="w-full flex justify-center items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-xl font-bold text-lg shadow-md transition-all active:scale-95">
                    <i data-lucide="scan-line" class="w-6 h-6"></i>
                    Buka Kamera Scanner
                </button>
                <div id="reader" class="hidden rounded-xl overflow-hidden border border-slate-200 bg-black w-full"></div>
            </div>

            <div id="tabManual" class="hidden bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex gap-2 relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    <input type="text" id="manualAwbInput" class="w-full bg-slate-50 border border-slate-200 pl-10 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Nomor AWB atau Booking">
                    <button id="searchBtn" class="bg-slate-800 hover:bg-slate-900 text-white px-5 rounded-xl font-bold transition active:scale-95 shadow-sm">Cari</button>
                </div>
                <div id="searchStatus" class="hidden mt-3 flex items-center gap-2 text-indigo-600 text-sm font-medium">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Mencari data
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        const supabaseUrl = 'https://qtsjehqdakvmmmnyuzda.supabase.co/rest/v1/awb_data';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0c2plaHFkYWt2bW1tbnl1emRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc4NzksImV4cCI6MjA5MDYyMzg3OX0.zeWEZw4Pw3dWqZpwRZFXnUHvDd_sMamSI9jRQquQPB8';
        
        const headers = {
            'apikey': supabaseKey,
            'Authorization': 'Bearer ' + supabaseKey,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=merge-duplicates'
        };

        let html5QrCode = null;
        let lastScannedAwb = '';

        const tabScannerBtn = document.getElementById('tabScannerBtn');
        const tabManualBtn = document.getElementById('tabManualBtn');
        const tabKamera = document.getElementById('tabKamera');
        const tabManual = document.getElementById('tabManual');

        const toggleAdminBtn = document.getElementById('toggleAdminBtn');
        const adminPanel = document.getElementById('adminPanel');
        const adminPassword = document.getElementById('adminPassword');
        const deleteDbBtn = document.getElementById('deleteDbBtn');
        const csvFileInput = document.getElementById('csvFileInput');
        const uploadAlert = document.getElementById('uploadAlert');
        const uploadStatus = document.getElementById('uploadStatus');
        const startScanBtn = document.getElementById('startScanBtn');
        const readerDiv = document.getElementById('reader');
        const resultCard = document.getElementById('resultCard');
        const resultContent = document.getElementById('resultContent');
        const manualAwbInput = document.getElementById('manualAwbInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchStatus = document.getElementById('searchStatus');

        tabScannerBtn.addEventListener('click', () => {
            tabScannerBtn.className = 'flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-indigo-700 transition-all';
            tabManualBtn.className = 'flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition-all';
            tabKamera.classList.remove('hidden');
            tabManual.classList.add('hidden');
        });

        tabManualBtn.addEventListener('click', () => {
            tabManualBtn.className = 'flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm text-indigo-700 transition-all';
            tabScannerBtn.className = 'flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition-all';
            tabManual.classList.remove('hidden');
            tabKamera.classList.add('hidden');
            hentikanScanner();
        });

        toggleAdminBtn.addEventListener('click', () => {
            adminPanel.classList.toggle('hidden');
        });

        function showUploadAlert(message, type) {
            uploadAlert.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-blue-50', 'text-blue-700', 'bg-green-50', 'text-green-700');
            uploadStatus.textContent = message;
            
            if (type === 'error') {
                uploadAlert.classList.add('bg-red-50', 'text-red-700');
            } else if (type === 'process') {
                uploadAlert.classList.add('bg-blue-50', 'text-blue-700');
            } else if (type === 'success') {
                uploadAlert.classList.add('bg-green-50', 'text-green-700');
            }
        }

        deleteDbBtn.addEventListener('click', async function() {
            if (adminPassword.value !== '123') {
                showUploadAlert("Password admin salah", "error");
                return;
            }
            
            showUploadAlert("Menghapus seluruh data", "process");
            
            try {
                const response = await fetch(`${supabaseUrl}?awb_no=not.is.null`, {
                    method: 'DELETE',
                    headers: headers
                });
                
                if (!response.ok) throw new Error("Gagal hapus");
                
                showUploadAlert("Semua data berhasil dihapus", "success");
            } catch (error) {
                showUploadAlert("Gagal menghapus data dari server", "error");
            }
        });

        csvFileInput.addEventListener('change', function(event) {
            if (adminPassword.value !== '123') {
                showUploadAlert("Password admin salah", "error");
                csvFileInput.value = '';
                return;
            }

            const file = event.target.files[0];
            if (!file) return;

            showUploadAlert("Membaca file CSV", "process");
            csvFileInput.disabled = true;

            Papa.parse(file, {
                header: true,
                delimiter: "|", 
                skipEmptyLines: true,
                complete: async function(results) {
                    showUploadAlert("Mengunggah data ke database", "process");
                    
                    const payload = results.data
                        .filter(row => row.awb_no)
                        .map(row => ({
                            awb_no: row.awb_no.trim(),
                            kode_booking: row.kode_booking ? row.kode_booking.trim() : '',
                            fop_code_internal: row.fop_code_internal || '',
                            destination_uz: row.destination_uz || '',
                            expect_delivery_tm: row.expect_delivery_tm || ''
                        }));

                    try {
                        await uploadDataKeSupabase(payload);
                        showUploadAlert(`Berhasil menyimpan ${payload.length} data`, "success");
                    } catch (error) {
                        showUploadAlert(`Gagal: ${error.message}`, "error");
                    }
                    csvFileInput.disabled = false;
                },
                error: function() {
                    showUploadAlert("Gagal membaca file CSV", "error");
                    csvFileInput.disabled = false;
                }
            });
        });

        async function uploadDataKeSupabase(dataArray) {
            const chunkSize = 500;
            for (let i = 0; i < dataArray.length; i += chunkSize) {
                const chunk = dataArray.slice(i, i + chunkSize);
                const response = await fetch(supabaseUrl, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(chunk)
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || "Gagal unggah ke server");
                }
            }
        }

        startScanBtn.addEventListener('click', function() {
            if (html5QrCode) {
                hentikanScanner();
                return;
            }
            mulaiScanner();
        });

        searchBtn.addEventListener('click', function() {
            const awb = manualAwbInput.value.trim();
            if (awb) cariDataDiDatabase(awb);
        });

        manualAwbInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const awb = manualAwbInput.value.trim();
                if (awb) cariDataDiDatabase(awb);
            }
        });

        function mulaiScanner() {
            readerDiv.classList.remove('hidden');
            startScanBtn.innerHTML = `<i data-lucide="x-circle" class="w-6 h-6"></i> Tutup Kamera`;
            startScanBtn.classList.replace('bg-indigo-600', 'bg-red-500');
            startScanBtn.classList.replace('hover:bg-indigo-700', 'hover:bg-red-600');
            lucide.createIcons();
            lastScannedAwb = '';

            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 300, height: 120 }, aspectRatio: 1.7777 },
                function(decodedText) {
                    const awb = decodedText.trim();
                    if (awb !== lastScannedAwb) {
                        lastScannedAwb = awb;
                        manualAwbInput.value = awb;
                        cariDataDiDatabase(awb);
                        
                        setTimeout(() => {
                            lastScannedAwb = '';
                        }, 3000);
                    }
                },
                function(errorMessage) {
                }
            ).catch(function() {
                readerDiv.innerHTML = `<div class="p-6 text-red-500 text-center font-bold bg-white"><i data-lucide="camera-off" class="w-8 h-8 mx-auto mb-2"></i>Gagal mengakses kamera</div>`;
                lucide.createIcons();
                hentikanScanner();
            });
        }

        function hentikanScanner() {
            if (html5QrCode) {
                try {
                    html5QrCode.stop().then(() => {
                        bersihkanUI();
                    }).catch(() => {
                        bersihkanUI();
                    });
                } catch (err) {
                    bersihkanUI();
                }
            }
        }

        function bersihkanUI() {
            if (html5QrCode) {
                try { html5QrCode.clear(); } catch(e) {}
                html5QrCode = null;
            }
            readerDiv.classList.add('hidden');
            startScanBtn.innerHTML = `<i data-lucide="scan-line" class="w-6 h-6"></i> Buka Kamera Scanner`;
            startScanBtn.classList.replace('bg-red-500', 'bg-indigo-600');
            startScanBtn.classList.replace('hover:bg-red-600', 'hover:bg-indigo-700');
            lucide.createIcons();
        }

        async function cariDataDiDatabase(awb) {
            searchStatus.classList.remove('hidden');
            resultCard.classList.add('hidden');
            searchBtn.disabled = true;

            try {
                const encodedAwb = encodeURIComponent(awb);
                const response = await fetch(`${supabaseUrl}?or=(awb_no.eq.${encodedAwb},kode_booking.eq.${encodedAwb})&select=*`, {
                    method: 'GET',
                    headers: headers
                });
                
                if (!response.ok) throw new Error("Gagal mengambil data");
                
                const data = await response.json();
                
                if (data && data.length > 0) {
                    tampilkanHasil(data[0]);
                } else {
                    tampilkanHasil(null, awb);
                }
            } catch (error) {
                resultCard.classList.remove('hidden');
                resultContent.innerHTML = `
                    <div class="text-center py-6">
                        <i data-lucide="wifi-off" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i>
                        <p class="text-red-600 font-medium">Terjadi kesalahan jaringan</p>
                    </div>`;
                lucide.createIcons();
                
                const resultElement = document.getElementById('resultCard');
                if (resultElement) {
                    resultElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            } finally {
                searchStatus.classList.add('hidden');
                searchBtn.disabled = false;
            }
        }

        function tampilkanHasil(data, awb) {
            resultCard.classList.remove('hidden');

            if (data) {
                let slaText = '-';
                let slaColor = 'text-indigo-700';
                
                if (data.expect_delivery_tm) {
                    const expectDate = new Date(data.expect_delivery_tm);
                    const today = new Date();
                    expectDate.setHours(0, 0, 0, 0);
                    today.setHours(0, 0, 0, 0);
                    
                    const diffTime = expectDate - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    if (diffDays > 0) {
                        slaText = diffDays + " hari lagi";
                    } else if (diffDays === 0) {
                        slaText = "Hari ini";
                        slaColor = 'text-orange-600';
                    } else {
                        slaText = "Terlambat " + Math.abs(diffDays) + " hari";
                        slaColor = 'text-red-600';
                    }
                }

                resultContent.innerHTML = `
                    <div class="space-y-4">
                        <div class="bg-indigo-50/50 p-4 rounded-xl border border-indigo-50">
                            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Nomor AWB / Booking</p>
                            <p class="font-bold text-2xl text-slate-900 tracking-tight">${data.awb_no}</p>
                            <p class="text-sm font-medium text-slate-600 mt-1">${data.kode_booking || 'Tanpa Kode Booking'}</p>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">SLA Paket</p>
                                <p class="font-bold text-lg ${slaColor}">${slaText}</p>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Target Kirim</p>
                                <p class="font-bold text-slate-800">${data.expect_delivery_tm || '-'}</p>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">FOP Internal</p>
                                <p class="font-bold text-slate-800">${data.fop_code_internal || '-'}</p>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Destinasi UZ</p>
                                <p class="font-bold text-slate-800">${data.destination_uz || '-'}</p>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                resultContent.innerHTML = `
                    <div class="text-center py-6">
                        <i data-lucide="file-question" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i>
                        <p class="text-slate-600 font-medium">Data <span class="text-slate-900 font-bold">${awb}</span> tidak ditemukan.</p>
                    </div>`;
            }
            lucide.createIcons();
            
            const resultElement = document.getElementById('resultCard');
            if (resultElement) {
                resultElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
